<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ESPGeiger · Set location</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin="">
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""></script>

  <style>
    :root { color-scheme: light dark; }
    body { margin:0; padding:0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; }
    #bar {
      position: fixed; top:0; left:0; right:0;
      background:#111; color:#eee; z-index:1000;
      display:flex; align-items:center; gap:12px;
      padding: 10px 16px; flex-wrap: wrap;
    }
    #bar h1 { margin:0; font-size: 18px; font-weight: 600; letter-spacing:.2px;
              display:flex; align-items:center; gap:8px; }
    #bar h1 svg { width:24px; height:24px; flex-shrink:0; }
    #coords {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 15px; background:#222; color:#eee;
      padding: 8px 14px; border-radius: 6px;
      flex: 1 1 180px; min-width: 180px;
    }
    button {
      border: 0; padding: 10px 18px; border-radius: 6px;
      font-size: 15px; font-weight: 500; cursor: pointer;
      transition: background .15s;
    }
    .primary { background:#0d6efd; color:#fff; }
    .primary:hover { background:#0b5ed7; }
    .primary:disabled { background:#555; cursor: not-allowed; }
    .ghost { background: transparent; color:#eee; border: 1px solid #555; }
    .ghost:hover { background:#2a2a2a; }
    .ghost:disabled { border-color:#333; color:#666; cursor: not-allowed; }
    #map { position: absolute; top:56px; bottom:0; right:0; left:0; }
    #hint {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.75); color:#eee; font-size: 13px;
      padding: 6px 12px; border-radius: 4px; z-index: 1000;
      pointer-events: none;
    }
    @media (max-width: 540px) {
      #bar { padding: 8px 10px; gap: 8px; }
      #bar h1 { font-size: 15px; }
      #map { top: 110px; }
    }
  </style>
</head>
<body>

<div id="bar">
  <h1>
    <svg viewBox="0 0 512 512" aria-hidden="true">
      <path fill="#666" d="M256 0a256 256 0 1 1 0 512 256 256 0 0 1 0-512z"/>
      <path fill="#FB2" d="M256 36a220 220 0 1 1 0 440 220 220 0 0 1 0-440z"/>
      <path fill="#555" d="M256 286a30 30 0 1 0 0-60 30 30 0 0 0 0 60zm28-82 62-109a182 182 0 0 0-182 1l63 109a57 57 0 0 1 57-1zm155 51H313c0 21-11 39-28 49l64 108c54-32 90-90 90-157zM163 412l64-108a57 57 0 0 1-28-49H73c0 67 36 125 90 157z"/>
    </svg>
    <span>ESPGeiger · Set location</span>
  </h1>
  <div id="coords">locating…</div>
  <button class="ghost"   id="locate">📍 Locate me</button>
  <button class="ghost"   id="copy"  disabled>Copy</button>
  <button class="primary" id="apply" disabled hidden>Apply to device</button>
</div>

<div id="map"></div>
<div id="hint">Drag the marker (or click the map) to fine-tune.</div>

<script>
(function () {
  const map = L.map('map', { zoomControl: true }).setView([20, 0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    subdomains: 'abcd',
    attribution:
      '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> ' +
      '&copy; <a href="https://carto.com/attribution">CARTO</a> · ' +
      'IP geolocation by <a href="https://db-ip.com">DB-IP</a>',
  }).addTo(map);

  const coordsEl   = document.getElementById('coords');
  const copyBtn    = document.getElementById('copy');
  const applyBtn   = document.getElementById('apply');
  const locateBtn  = document.getElementById('locate');

  // Apply button only matters when we have a window.opener to postMessage
  // to — i.e. the popup was launched from the device's /param page.
  // Standalone visitors can still see the map and copy coords manually.
  // Reading window.opener across http→https can throw in some browsers'
  // cross-origin-opener policy, so wrap it defensively.
  let hasOpener = false;
  try { hasOpener = !!window.opener; } catch (_) {}
  if (hasOpener) {
    applyBtn.hidden = false;
    applyBtn.textContent = 'Send to device';
  }

  let marker = null, lat = null, lon = null;

  const setCoords = (la, lo) => {
    lat = +la.toFixed(5);
    lon = +lo.toFixed(5);
    coordsEl.textContent = lat + ', ' + lon;
    copyBtn.disabled  = false;
    applyBtn.disabled = false;
  };

  const placeMarker = (ll) => {
    if (marker) marker.setLatLng(ll);
    else {
      marker = L.marker(ll, { draggable: true }).addTo(map);
      marker.on('dragend', (e) => {
        const p = e.target.getLatLng();
        setCoords(p.lat, p.lng);
      });
    }
    setCoords(ll.lat, ll.lng);
  };

  map.on('click', (e) => placeMarker(e.latlng));

  copyBtn.addEventListener('click', () => {
    if (lat == null) return;
    const s = lat + ', ' + lon;
    const after = () => {
      const prev = copyBtn.textContent;
      copyBtn.textContent = '✓ Copied';
      setTimeout(() => copyBtn.textContent = prev, 1200);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(s).then(after).catch(after);
    } else {
      // Pre-clipboard-API fallback.
      const ta = document.createElement('textarea');
      ta.value = s; document.body.appendChild(ta);
      ta.select(); try { document.execCommand('copy'); } catch (_) {}
      document.body.removeChild(ta); after();
    }
  });

  applyBtn.addEventListener('click', () => {
    if (lat == null) return;
    try {
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(
          { type: 'espgeiger-location', lat: lat, lon: lon }, '*'
        );
      }
    } catch (_) { /* opener severed — nothing more we can do */ }
    // Some browsers refuse window.close() on popups opened cross-scheme
    // (http opener → https popup). Try anyway; if we're still here after
    // a moment, show a hint so the user knows to close the tab manually.
    try { window.close(); } catch (_) {}
    setTimeout(() => {
      coordsEl.textContent = '✓ Sent to device — close this tab';
      applyBtn.disabled = true;
      applyBtn.textContent = 'Sent';
    }, 500);
  });

  // Re-trigger browser geolocation on demand. Useful if the user denied
  // the permission prompt at load time, or moved and wants to re-pick.
  locateBtn.addEventListener('click', () => {
    if (!navigator.geolocation) return ipFallback();
    locateBtn.disabled = true;
    const prev = locateBtn.textContent;
    locateBtn.textContent = '📍 Locating…';
    const restore = () => { locateBtn.disabled = false; locateBtn.textContent = prev; };
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const ll = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setView([ll.lat, ll.lng], 16);
        placeMarker(ll);
        restore();
      },
      (_err) => { ipFallback(); restore(); },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  });

  // Try browser geolocation (HTTPS required — we are HTTPS, so fine).
  //
  // Error handling is deliberate:
  //   code 1 (PERMISSION_DENIED) — user told us no. Respect it. Don't
  //                                fall back to IP-based lookup; that
  //                                just works around their decision.
  //                                Show the world map, let them click.
  //   code 2 (POSITION_UNAVAILABLE) — device can't get a fix (no GPS,
  //                                no wifi, etc.). IP fallback is a
  //                                fair attempt.
  //   code 3 (TIMEOUT)           — same as unavailable in practice.
  //
  // ipinfo.io is a 3rd-party processor — worth avoiding unless it
  // materially helps. We only call it when browser geolocation
  // technically failed, not when the user opted out.
  function ipFallback() {
    fetch('https://ipinfo.io/json')
      .then((r) => r.json())
      .then((j) => {
        if (!j.loc) return worldView();
        const [la, lo] = j.loc.split(',').map(Number);
        map.setView([la, lo], 11);
        placeMarker({ lat: la, lng: lo });
      })
      .catch(worldView);
  }
  function worldView(hint) {
    map.setView([20, 0], 2);
    coordsEl.textContent = hint || '— · click / drag to set —';
  }

  if (!navigator.geolocation) return ipFallback();
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const ll = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      map.setView([ll.lat, ll.lng], 16);
      placeMarker(ll);
    },
    (err) => {
      if (err && err.code === 1) {
        // PERMISSION_DENIED — user opted out. No IP fallback.
        worldView('permission denied · click / drag to set location');
      } else {
        // Technical failure — device can't fix position. IP fallback OK.
        ipFallback();
      }
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
  );
})();
</script>
</body>
</html>
